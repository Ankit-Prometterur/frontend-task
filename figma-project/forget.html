<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forget Page</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
    <link rel="stylesheet" href="forget.css">
</head>
<body>
    <div class="main-container">
    <div class="left-container">
      <img src="./assets/login-bg.png" alt="" class="left-bg">
      <img src="./assets/overlay-1.png" alt="" class="top-overlay">
      <img src="./assets/overlay-2.png" alt="" class="side-overlay">
      <div class="left-content">
        <img src="./assets/logo.png" alt="" class="logo-img">
        <img src="./assets/card-img.png" alt="" class="card-img">
      </div>
    </div>

    <div class="right-container">
      <div class="right-content">
        <div class="forget-txt">
          <h1>Reset Your Password</h1>
          <p>Enter your email address and we'll send you a reset password code</p>
        </div>
        <form class="signup-form">
          <div class="input-group full-width">
            <label>Email</label>
            <input type="text" placeholder="Enter your email">
          </div>
          <button type="submit" class="submit-btn">Send Reset Code</button>
        </form>
      </div>
    </div>
  </div>
</body>
</html>
